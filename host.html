<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mega Star Sports - Host Control</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        background-color: #f4f4f4;
        padding: 20px;
      }
      .card {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        max-width: 400px;
        margin: auto;
      }
      button {
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin: 10px;
        width: 90%;
        transition: 0.3s;
      }
      button:active {
        transform: scale(0.95);
      }
      input {
        padding: 15px;
        font-size: 16px;
        width: 80%;
        margin-bottom: 20px;
        border: 1px solid #ccc;
        border-radius: 5px;
        text-align: center;
      }
      #loginBtn {
        background-color: #007bff;
        color: white;
      }
      #pickBtn {
        background-color: #28a745;
        color: white;
      }
      #resetBtn {
        background-color: #dc3545;
        color: white;
      }
      #controlPanel {
        display: none;
      }

      /* புதிதாக சேர்க்கப்பட்ட டிசைன் */
      #lastPickedText {
        color: #d9534f;
        background: #ffeeba;
        padding: 15px;
        border-radius: 8px;
        display: none;
        font-size: 24px;
        border: 2px dashed #d9534f;
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <div class="card" id="loginScreen">
      <h2>Host Login 🔒</h2>
      <p>Please enter the secret passcode.</p>
      <input type="password" id="passcodeInput" placeholder="Enter Passcode" />
      <button id="loginBtn" onclick="checkLogin()">Login</button>
      <p id="errorMsg" style="color: red; display: none; margin-top: 10px">
        Wrong Passcode! Try again.
      </p>
    </div>

    <div class="card" id="controlPanel">
      <h2>Host Control Panel 🎛️</h2>
      <h3 id="statusText">Remaining: Loading...</h3>

      <h2 id="lastPickedText">🎯 Picked: -</h2>

      <button id="pickBtn" onclick="pickCountry()">
        🎲 Pick Random Country
      </button>
      <br /><br />
      <button id="resetBtn" onclick="resetGame()">
        🔄 Reset Game (25 Countries)
      </button>
    </div>

    <script>
      // === உங்களது FIREBASE CONFIG-ஐ இங்கே பேஸ்ட் செய்யவும் ===
      const firebaseConfig = {
        apiKey: "AIzaSyCh8J0jMnb10oW3Rv_fXdEIx1SM4yVH8fQ",
        authDomain: "megastarsports-8c464.firebaseapp.com",
        databaseURL: "https://megastarsports-8c464-default-rtdb.firebaseio.com",
        projectId: "megastarsports-8c464",
        storageBucket: "megastarsports-8c464.firebasestorage.app",
        messagingSenderId: "225725348192",
        appId: "1:225725348192:web:aad2fef767b240f6dac605",
      };
      // ==========================================================

      firebase.initializeApp(firebaseConfig);
      const db = firebase.database();

      const allCountries = [
        "Saudi Arabia",
        "Dubai",
        "Qatar",
        "Kuwait",
        "Oman",
        "Maldives",
        "Australia",
        "Canada",
        "Iraq",
        "China",
        "Yemen",
        "Turkey",
        "Egypt",
        "Iran",
        "Syria",
        "Sri Lanka",
        "India",
        "Pakistan",
        "Bangladesh",
        "Malaysia",
        "Singapore",
        "Japan",
        "France",
        "Germany",
        "America",
      ];
      let currentRemaining = [];

      function checkLogin() {
        const pass = document.getElementById("passcodeInput").value;
        if (pass === "mega2026") {
          document.getElementById("loginScreen").style.display = "none";
          document.getElementById("controlPanel").style.display = "block";
        } else {
          document.getElementById("errorMsg").style.display = "block";
          document.getElementById("passcodeInput").value = "";
        }
      }

      db.ref("gameState").on("value", (snapshot) => {
        const data = snapshot.val();

        // மிதமுள்ள நாடுகளின் எண்ணிக்கை
        if (data && data.remaining) {
          currentRemaining = data.remaining;
          document.getElementById("statusText").innerText =
            `Remaining: ${currentRemaining.length} / 25`;
        } else {
          document.getElementById("statusText").innerText =
            "Click Reset to Start!";
        }

        // Host-க்கு ரிசல்ட்டைக் காட்டும் புதிய கோட்
        const pickedEl = document.getElementById("lastPickedText");
        if (data && data.winner) {
          pickedEl.style.display = "block";
          pickedEl.innerText = `🎯 Picked: ${data.winner}`;
        } else {
          pickedEl.style.display = "none";
        }
      });

      function resetGame() {
        if (confirm("Are you sure? All 25 countries will be loaded back.")) {
          db.ref("gameState").set({
            remaining: allCountries,
            winner: "",
            triggerAnimation: Date.now(),
          });
        }
      }

      function pickCountry() {
        if (currentRemaining.length === 0) {
          alert("Game Over! No countries left.");
          return;
        }
        const randomIndex = Math.floor(Math.random() * currentRemaining.length);
        const pickedCountry = currentRemaining[randomIndex];
        currentRemaining.splice(randomIndex, 1);

        db.ref("gameState").set({
          remaining: currentRemaining,
          winner: pickedCountry,
          triggerAnimation: Date.now(),
        });
      }
    </script>
  </body>
</html>
